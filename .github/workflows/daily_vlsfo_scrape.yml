name: Daily VLSFO Scrape

on:
  schedule:
    - cron: "30 22 * * *" # KST 07:30
  workflow_dispatch:

jobs:
  scrape-vlsfo:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.9"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run VLSFO scraper
        run: python VLSFO/vlsfo_scraper.py

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add VLSFO/vlsfo_prices.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update VLSFO price data" && git push)
