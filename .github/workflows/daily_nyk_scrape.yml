name: Daily NYK Vessel Schedule Scrape

on:
  schedule:
    - cron: "15 1,7 * * *"
  workflow_dispatch:

jobs:
  scrape-nyk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run NYK scraper
        run: python NYK/nyk_scraper.py

      - name: Commit and push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add NYK/nyk_schedule.json NYK/nyk_schedule_archive.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update NYK vessel schedule" && git push)
