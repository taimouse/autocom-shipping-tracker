    <script>
      // лӘЁлӢ¬ м—ҙкё°/лӢ«кё° н•ЁмҲҳ
      function openModal() {
        document.getElementById("filterModal").style.display = "block";
        document.body.style.overflow = "hidden"; // л°°кІҪ мҠӨнҒ¬лЎӨ л°©м§Җ
      }

      function closeModal() {
        document.getElementById("filterModal").style.display = "none";
        document.body.style.overflow = "auto"; // л°°кІҪ мҠӨнҒ¬лЎӨ ліөмӣҗ
      }

      // лӘЁлӢ¬ мҷёл¶Җ нҒҙлҰӯ мӢң лӢ«кё°
      window.onclick = function (event) {
        const modal = document.getElementById("filterModal");
        if (event.target === modal) {
          closeModal();
        }
      };

      // ESC нӮӨлЎң лӘЁлӢ¬ лӢ«кё°
      document.addEventListener("keydown", function (event) {
        if (event.key === "Escape") {
          closeModal();
        }
      });

      let shippingData = [];
      let crossRouteShippingData = []; // лӢӨлҘё лЈЁнҠё(мҳҲ: asia_africa)мқҳ м¶”к°Җ лҸ„м°© мҠӨмјҖмӨ„мқ„ м ҖмһҘн•ҳкё° мң„н•ң л°°м—ҙ
      let calendar = null;
      let selectedCompanies = [];
      let selectedDeparturePorts = []; // м¶ңл°ң нҸ¬нҠё м„ нғқ
      let selectedArrivalPorts = []; // лҸ„м°© нҸ¬нҠё м„ нғқ
      let selectedCrossArrivalPorts = []; // м•„н”„лҰ¬м№ҙ лҸ„м°© нҸ¬нҠё м„ нғқ (EAST ASIA м—°мһҘ)
      let companyColors = {}; // нҡҢмӮ¬лі„ мғүмғҒ л§ө
      let currentRoute = "east_asia"; // нҳ„мһ¬ м„ нғқлҗң лЈЁнҠё

      // лЈЁнҠёлі„ JSON URL м„Өм •
      const routeUrls = {
        east_asia:
          "https://raw.githubusercontent.com/taimouse/autocom-shipping-tracker/refs/heads/master/shipping_update_east_asia.json",
        asia_africa:
          "https://raw.githubusercontent.com/taimouse/autocom-shipping-tracker/refs/heads/master/shipping_update_asia_africa.json",
      };

      // лЈЁнҠёлі„ м•„м№ҙмқҙлёҢ JSON URL м„Өм •
      const archiveUrls = {
        east_asia:
          "https://raw.githubusercontent.com/taimouse/autocom-shipping-tracker/refs/heads/master/shipping_archive_east_asia.json",
        asia_africa:
          "https://raw.githubusercontent.com/taimouse/autocom-shipping-tracker/refs/heads/master/shipping_archive_asia_africa.json",
      };

      // мғүмғҒ нҢ”л ҲнҠё (нҡҢмӮ¬ мҲҳл§ҢнҒј л°ҳліө мӮ¬мҡ©) - 500нҶӨ мғүмғҒ
      const colorPalette = [
        "#2196F3", // нҢҢлһҖмғү 500
        "#4CAF50", // мҙҲлЎқмғү 500
        "#FF9800", // мЈјнҷ©мғү 500
        "#9C27B0", // ліҙлқјмғү 500
        "#009688", // мІӯлЎқмғү 500
        "#607D8B", // мІӯнҡҢмғү 500
        "#795548", // к°Ҳмғү 500
        "#FFEB3B", // л…ёлһҖмғү 500
        "#F44336", // л№Ёк°„мғү 500
        "#00BCD4", // мІӯлЎқмғү 500
      ];

      // м§Җм •лҗң нҡҢмӮ¬ кі м • мғүмғҒ
      const fixedCompanyColors = {
        NYK: "#00a334",
        MOL: "#0095b9",
        KEIHIN: "#b30232",
        SEALS: "#5f2c1b",
        ECL: "#2196f3",
        "K-LINE": "#9c27b0",
        GRIMALDI: "#eb7f0c",
        HOEGH: "#607d8b",
        "G ALLIANCE SHIPPING": "#00467d",
      };

      // лЈЁнҠё ліҖкІҪ н•ЁмҲҳ
      function changeRoute() {
        const selectorMobile = document.getElementById("routeSelector");
        const selectorSidebar = document.getElementById("routeSelectorSidebar");

        // м–ҙлҠҗ мӘҪм—җм„ң ліҖкІҪлҗҳм—ҲлҠ”м§Җ нҷ•мқён•ҳкі  лӢӨлҘё мӘҪ лҸҷкё°нҷ”
        if (event && event.target.id === "routeSelector") {
          currentRoute = selectorMobile.value;
          if (selectorSidebar) selectorSidebar.value = currentRoute;
        } else if (event && event.target.id === "routeSelectorSidebar") {
          currentRoute = selectorSidebar.value;
          if (selectorMobile) selectorMobile.value = currentRoute;
        } else {
          // мҙҲкё° лЎңл“ң мӢң
          currentRoute = selectorMobile
            ? selectorMobile.value
            : selectorSidebar
              ? selectorSidebar.value
              : "east_asia";
        }

        loadShippingData(routeUrls[currentRoute], archiveUrls[currentRoute]);
      }

      // JSON лҚ°мқҙн„° лЎңл“ң н•ЁмҲҳ (мөңмӢ  + м•„м№ҙмқҙлёҢ лі‘н•©)
      function loadShippingData(url, archiveUrl) {
        // мөңмӢ  лҚ°мқҙн„°мҷҖ м•„м№ҙмқҙлёҢ лҚ°мқҙн„°лҘј лҸҷмӢң лЎңл“ң
        const fetchCurrent = fetch(url).then((r) => r.json());
        const fetchArchive = archiveUrl
          ? fetch(archiveUrl)
              .then((r) => r.json())
              .catch(() => []) // м•„м№ҙмқҙлёҢ нҢҢмқјмқҙ м—Ҷмңјл©ҙ л№Ҳ л°°м—ҙ
          : Promise.resolve([]);

        // нҳ„мһ¬ лЈЁнҠёк°Җ east_asiaмқј л•Ң asia_africa лҚ°мқҙн„°лҸ„ н•Ёк»ҳ лЎңл“ңн•ҳм—¬ нҲҙнҢҒм—җ м—°кІ° мҠӨмјҖмӨ„ н‘ңмӢң
        let fetches = [fetchCurrent, fetchArchive];
        if (currentRoute === "east_asia") {
          const crossUrl = routeUrls["asia_africa"];
          const crossArchiveUrl = archiveUrls["asia_africa"];
          const fetchCrossCurrent = fetch(crossUrl)
            .then((r) => r.json())
            .catch(() => []);
          const fetchCrossArchive = crossArchiveUrl
            ? fetch(crossArchiveUrl)
                .then((r) => r.json())
                .catch(() => [])
            : Promise.resolve([]);
          fetches.push(fetchCrossCurrent, fetchCrossArchive);
        } else {
          fetches.push(Promise.resolve([]), Promise.resolve([]));
        }

        Promise.all(fetches)
          .then(
            ([
              currentData,
              archiveData,
              crossCurrentData,
              crossArchiveData,
            ]) => {
              // мӨ‘ліө м ңкұ° лі‘н•© (Company + Ship Name + Voyage нӮӨ кё°мӨҖ)
              const seen = new Set();
              const merged = [];

              // мөңмӢ  лҚ°мқҙн„° мҡ°м„  (isArchive = false)
              currentData.forEach((ship) => {
                const key = `${ship.Company}|${ship["Ship Name"]}|${ship.Voyage}`;
                if (!seen.has(key)) {
                  seen.add(key);
                  ship.isArchive = false;
                  merged.push(ship);
                }
              });

              // м•„м№ҙмқҙлёҢ лҚ°мқҙн„° м¶”к°Җ (мӨ‘ліө м ңмҷё, isArchive = true)
              archiveData.forEach((ship) => {
                const key = `${ship.Company}|${ship["Ship Name"]}|${ship.Voyage}`;
                if (!seen.has(key)) {
                  seen.add(key);
                  ship.isArchive = true;
                  merged.push(ship);
                }
              });

              shippingData = merged;

              // көҗм°Ё лЈЁнҠё лҚ°мқҙн„°(asia_africa) лі‘н•©
              if (currentRoute === "east_asia") {
                const crossSeen = new Set();
                const crossMerged = [];
                crossCurrentData.forEach((ship) => {
                  const key = `${ship.Company}|${ship["Ship Name"]}|${ship.Voyage}`;
                  if (!crossSeen.has(key)) {
                    crossSeen.add(key);
                    crossMerged.push(ship);
                  }
                });
                crossArchiveData.forEach((ship) => {
                  const key = `${ship.Company}|${ship["Ship Name"]}|${ship.Voyage}`;
                  if (!crossSeen.has(key)) {
                    crossSeen.add(key);
                    crossMerged.push(ship);
                  }
                });
                crossRouteShippingData = crossMerged;
              } else {
                crossRouteShippingData = [];
              }

              // нҡҢмӮ¬лӘ… ліҖнҷҳ (кёҙ мқҙлҰ„мқҖ м§§кІҢ)
              const companyNameMap = {
                "SEVEN SEALS CO.,LTD": "SEALS",
                "THE KEIHIN CO., LTD.": "KEIHIN",
              };
              shippingData.forEach((ship) => {
                ship.Company = companyNameMap[ship.Company] || ship.Company;
              });
              crossRouteShippingData.forEach((ship) => {
                ship.Company = companyNameMap[ship.Company] || ship.Company;
              });

              companyColors = {}; // мғүмғҒ л§ө мҙҲкё°нҷ”
              populateCompanySelect();
              populatePortSelect();
              if (calendar) {
                calendar.destroy();
              }
              initCalendars();
            },
          )
          .catch((error) => console.error("Error loading JSON:", error));
      }

      // мҙҲкё° лЎңл“ң
      loadShippingData(routeUrls[currentRoute], archiveUrls[currentRoute]);

      // нҡҢмӮ¬ лӘ©лЎқмқ„ checkboxлЎң м¶”к°Җ (PC/SP м–‘мӘҪ)
      function populateCompanySelect() {
        const companies = [
          ...new Set(shippingData.map((ship) => ship.Company)),
        ].sort();

        // мҙҲкё°нҷ”: лӘЁл“  нҡҢмӮ¬ м„ нғқ
        selectedCompanies = [...companies];

        // нҡҢмӮ¬лі„ мғүмғҒ н• лӢ№
        companies.forEach((company, index) => {
          if (fixedCompanyColors[company]) {
            companyColors[company] = fixedCompanyColors[company];
          } else {
            companyColors[company] = colorPalette[index % colorPalette.length];
          }
        });

        // SP лӘЁлӢ¬ мғқм„ұ
        createCompanyCheckboxes(
          companies,
          "companyCheckboxes",
          "selectAll",
          false,
        );

        // PC мӮ¬мқҙл“ңл°” мғқм„ұ
        createCompanyCheckboxes(
          companies,
          "companyCheckboxesSidebar",
          "selectAllSidebar",
          true,
        );
      }

      // нҡҢмӮ¬ мІҙнҒ¬л°•мҠӨ мғқм„ұ н—¬нҚј н•ЁмҲҳ
      function createCompanyCheckboxes(
        companies,
        containerId,
        selectAllId,
        isSidebar,
      ) {
        const container = document.getElementById(containerId);
        const selectAllCheckbox = document.getElementById(selectAllId);

        if (!container || !selectAllCheckbox) return;

        // кё°мЎҙ мІҙнҒ¬л°•мҠӨ м ңкұ°
        container.innerHTML = "";

        companies.forEach((company) => {
          const div = document.createElement("div");
          div.className = "flex items-center";

          const checkbox = document.createElement("input");
          checkbox.type = "checkbox";
          checkbox.id = `company_${company.replace(/\s+/g, "_")}_${isSidebar ? "sidebar" : "modal"}`;
          checkbox.value = company;
          checkbox.checked = true;
          checkbox.className = `mr-2 company-checkbox-${isSidebar ? "sidebar" : "modal"}`;
          checkbox.dataset.company = company;

          const label = document.createElement("label");
          label.htmlFor = checkbox.id;
          label.className = "cursor-pointer text-xs flex items-center";

          const colorDot = document.createElement("span");
          colorDot.style.display = "inline-block";
          colorDot.style.width = "10px";
          colorDot.style.height = "10px";
          colorDot.style.borderRadius = "50%";
          colorDot.style.backgroundColor = companyColors[company] || "#ccc";
          colorDot.style.marginRight = "6px";

          label.appendChild(colorDot);
          label.appendChild(document.createTextNode(company));

          div.appendChild(checkbox);
          div.appendChild(label);
          container.appendChild(div);

          // checkbox ліҖкІҪ мқҙлІӨнҠё - м–‘мӘҪ лҸҷкё°нҷ”
          checkbox.addEventListener("change", (e) => {
            const company = e.target.dataset.company;
            const isChecked = e.target.checked;

            // м „м—ӯ мғҒнғң м—…лҚ°мқҙнҠё
            if (isChecked) {
              if (!selectedCompanies.includes(company)) {
                selectedCompanies.push(company);
              }
            } else {
              selectedCompanies = selectedCompanies.filter(
                (c) => c !== company,
              );
            }

            // л°ҳлҢҖнҺё мІҙнҒ¬л°•мҠӨ лҸҷкё°нҷ”
            const otherCheckboxes = document.querySelectorAll(
              `input[data-company="${company}"]`,
            );
            otherCheckboxes.forEach((cb) => {
              if (cb !== e.target) cb.checked = isChecked;
            });

            updateSelectAllCheckbox();
            updateCalendar();
          });
        });

        // м „мІҙ м„ нғқ/н•ҙм ң мқҙлІӨнҠё
        const newSelectAll = selectAllCheckbox.cloneNode(true);
        selectAllCheckbox.replaceWith(newSelectAll);

        document.getElementById(selectAllId).addEventListener("change", (e) => {
          const isChecked = e.target.checked;
          const checkboxes = document.querySelectorAll(
            `.company-checkbox-${isSidebar ? "sidebar" : "modal"}`,
          );

          checkboxes.forEach((cb) => {
            cb.checked = isChecked;
          });

          // м „м—ӯ мғҒнғң м—…лҚ°мқҙнҠё
          selectedCompanies.splice(0, selectedCompanies.length);
          if (isChecked) {
            selectedCompanies.push(...companies);
          }

          // л°ҳлҢҖнҺё м „мІҙ м„ нғқ лҸҷкё°нҷ”
          const otherSelectAll = document.getElementById(
            isSidebar ? "selectAll" : "selectAllSidebar",
          );
          if (otherSelectAll) otherSelectAll.checked = isChecked;

          // л°ҳлҢҖнҺё к°ңлі„ мІҙнҒ¬л°•мҠӨ лҸҷкё°нҷ”
          const otherCheckboxes = document.querySelectorAll(
            `.company-checkbox-${isSidebar ? "modal" : "sidebar"}`,
          );
          otherCheckboxes.forEach((cb) => (cb.checked = isChecked));

          updateCalendar();
        });
      }

      // м „мІҙ м„ нғқ мІҙнҒ¬л°•мҠӨ мғҒнғң м—…лҚ°мқҙнҠё (PC/SP м–‘мӘҪ)
      function updateSelectAllCheckbox() {
        // SP лӘЁлӢ¬
        const checkboxesModal = document.querySelectorAll(
          ".company-checkbox-modal",
        );
        const selectAllModal = document.getElementById("selectAll");
        if (checkboxesModal.length > 0 && selectAllModal) {
          const allCheckedModal = Array.from(checkboxesModal).every(
            (cb) => cb.checked,
          );
          selectAllModal.checked = allCheckedModal;
        }

        // PC мӮ¬мқҙл“ңл°”
        const checkboxesSidebar = document.querySelectorAll(
          ".company-checkbox-sidebar",
        );
        const selectAllSidebar = document.getElementById("selectAllSidebar");
        if (checkboxesSidebar.length > 0 && selectAllSidebar) {
          const allCheckedSidebar = Array.from(checkboxesSidebar).every(
            (cb) => cb.checked,
          );
          selectAllSidebar.checked = allCheckedSidebar;
        }
      }

      // нҸ¬нҠё лӘ©лЎқмқ„ checkboxлЎң м¶”к°Җ (м¶ңл°ң/лҸ„м°© нҸ¬нҠё лі„лҸ„ н•„н„°л§Ғ, PC/SP м–‘мӘҪ)
      function populatePortSelect() {
        const departurePorts = new Set();
        const arrivalPorts = new Set();
        const crossArrivalPorts = new Set(); // EAST ASIAмқҳ ASIA AFRICA м—°мһҘ лҸ„м°© нҸ¬нҠё

        // м¶ңл°ң нҸ¬нҠёмҷҖ лҸ„м°© нҸ¬нҠё к°Ғк°Ғ мҲҳм§‘
        shippingData.forEach((ship) => {
          Object.keys(ship["Departure Ports"]).forEach((port) => {
            if (ship["Departure Ports"][port] !== "-") departurePorts.add(port);
          });
          Object.keys(ship["Arrival Ports"]).forEach((port) => {
            if (ship["Arrival Ports"][port] !== "-") arrivalPorts.add(port);
          });

          // көҗм°Ё лЈЁнҠё лҚ°мқҙн„° л§Өм№ӯ нҷ•мқё л°Ҹ crossArrivalPorts м¶”к°Җ
          if (
            currentRoute === "east_asia" &&
            crossRouteShippingData.length > 0
          ) {
            const crossShipMatch = crossRouteShippingData.find(
              (cs) =>
                cs.Company === ship.Company &&
                cs["Ship Name"] === ship["Ship Name"] &&
                cs.Voyage === ship.Voyage,
            );
            if (crossShipMatch) {
              const sourceDepPorts = Object.keys(
                ship["Departure Ports"],
              ).filter((p) => ship["Departure Ports"][p] !== "-");
              const crossDepPorts = Object.keys(
                crossShipMatch["Departure Ports"],
              ).filter((p) => crossShipMatch["Departure Ports"][p] !== "-");
              let hasMatchingDeparture = sourceDepPorts.some((p) =>
                crossDepPorts.includes(p),
              );
              if (hasMatchingDeparture) {
                Object.keys(crossShipMatch["Arrival Ports"]).forEach((port) => {
                  if (crossShipMatch["Arrival Ports"][port] !== "-")
                    crossArrivalPorts.add(port);
                });
              }
            }
          }
        });

        const departurePortsList = [...departurePorts].sort();
        const arrivalPortsList = [...arrivalPorts].sort();
        const crossArrivalPortsList = [...crossArrivalPorts].sort();

        // лЈЁнҠёлі„ мҙҲкё° нҸ¬нҠё м„ нғқ
        selectedDeparturePorts.splice(0, selectedDeparturePorts.length);
        selectedArrivalPorts.splice(0, selectedArrivalPorts.length);
        selectedCrossArrivalPorts.splice(0, selectedCrossArrivalPorts.length);

        if (currentRoute === "east_asia") {
          if (arrivalPortsList.includes("Hambantota")) {
            selectedArrivalPorts.push("Hambantota");
          }
        } else if (currentRoute === "asia_africa") {
          if (arrivalPortsList.includes("Mombasa")) {
            selectedArrivalPorts.push("Mombasa");
          }
        }

        // SP лӘЁлӢ¬ мғқм„ұ
        createPortCheckboxes(
          departurePortsList,
          "departurePortCheckboxes",
          "departure-port-checkbox-modal",
          selectedDeparturePorts,
        );
        createPortCheckboxes(
          arrivalPortsList,
          "arrivalPortCheckboxes",
          "arrival-port-checkbox-modal",
          selectedArrivalPorts,
        );

        // PC мӮ¬мқҙл“ңл°” мғқм„ұ
        createPortCheckboxes(
          departurePortsList,
          "departurePortCheckboxesSidebar",
          "departure-port-checkbox-sidebar",
          selectedDeparturePorts,
        );
        createPortCheckboxes(
          arrivalPortsList,
          "arrivalPortCheckboxesSidebar",
          "arrival-port-checkbox-sidebar",
          selectedArrivalPorts,
        );

        // м•„н”„лҰ¬м№ҙ лҸ„м°© нҸ¬нҠё м„№м…ҳ н‘ңмӢң/мҲЁк№Җ л°Ҹ мғқм„ұ
        const crossSectionModal = document.getElementById(
          "crossArrivalFilterSectionModal",
        );
        const crossSectionSidebar = document.getElementById(
          "crossArrivalFilterSectionSidebar",
        );
        if (currentRoute === "east_asia" && crossArrivalPortsList.length > 0) {
          if (crossSectionModal) crossSectionModal.classList.remove("hidden");
          if (crossSectionSidebar)
            crossSectionSidebar.classList.remove("hidden");

          createPortCheckboxes(
            crossArrivalPortsList,
            "crossArrivalPortCheckboxes",
            "cross-arrival-port-checkbox-modal",
            selectedCrossArrivalPorts,
          );
          createPortCheckboxes(
            crossArrivalPortsList,
            "crossArrivalPortCheckboxesSidebar",
            "cross-arrival-port-checkbox-sidebar",
            selectedCrossArrivalPorts,
          );
        } else {
          if (crossSectionModal) crossSectionModal.classList.add("hidden");
          if (crossSectionSidebar) crossSectionSidebar.classList.add("hidden");
        }

        // м „мІҙ м„ нғқ мқҙлІӨнҠё м„Өм •
        setupPortSelectAllEvents(
          departurePortsList,
          arrivalPortsList,
          crossArrivalPortsList,
        );
      }

      // нҸ¬нҠё м „мІҙ м„ нғқ мқҙлІӨнҠё м„Өм •
      function setupPortSelectAllEvents(
        departurePortsList,
        arrivalPortsList,
        crossArrivalPortsList,
      ) {
        // м¶ңл°ң нҸ¬нҠё м „мІҙ м„ нғқ - SP
        const selectAllDepartureModal = document.getElementById(
          "selectAllDeparturePorts",
        );
        if (selectAllDepartureModal) {
          const newEl = selectAllDepartureModal.cloneNode(true);
          selectAllDepartureModal.replaceWith(newEl);
          newEl.addEventListener("change", (e) => {
            handlePortSelectAll(
              e.target.checked,
              departurePortsList,
              selectedDeparturePorts,
              "departure-port-checkbox-modal",
              "departure-port-checkbox-sidebar",
            );
          });
        }

        // м¶ңл°ң нҸ¬нҠё м „мІҙ м„ нғқ - PC
        const selectAllDepartureSidebar = document.getElementById(
          "selectAllDeparturePortsSidebar",
        );
        if (selectAllDepartureSidebar) {
          const newEl = selectAllDepartureSidebar.cloneNode(true);
          selectAllDepartureSidebar.replaceWith(newEl);
          newEl.addEventListener("change", (e) => {
            handlePortSelectAll(
              e.target.checked,
              departurePortsList,
              selectedDeparturePorts,
              "departure-port-checkbox-sidebar",
              "departure-port-checkbox-modal",
            );
          });
        }

        // лҸ„м°© нҸ¬нҠё м „мІҙ м„ нғқ - SP
        const selectAllArrivalModal = document.getElementById(
          "selectAllArrivalPorts",
        );
        if (selectAllArrivalModal) {
          const newEl = selectAllArrivalModal.cloneNode(true);
          selectAllArrivalModal.replaceWith(newEl);
          newEl.addEventListener("change", (e) => {
            handlePortSelectAll(
              e.target.checked,
              arrivalPortsList,
              selectedArrivalPorts,
              "arrival-port-checkbox-modal",
              "arrival-port-checkbox-sidebar",
            );
          });
        }

        // лҸ„м°© нҸ¬нҠё м „мІҙ м„ нғқ - PC
        const selectAllArrivalSidebar = document.getElementById(
          "selectAllArrivalPortsSidebar",
        );
        if (selectAllArrivalSidebar) {
          const newEl = selectAllArrivalSidebar.cloneNode(true);
          selectAllArrivalSidebar.replaceWith(newEl);
          newEl.addEventListener("change", (e) => {
            handlePortSelectAll(
              e.target.checked,
              arrivalPortsList,
              selectedArrivalPorts,
              "arrival-port-checkbox-sidebar",
              "arrival-port-checkbox-modal",
            );
          });
        }

        // м•„н”„лҰ¬м№ҙ лҸ„м°© нҸ¬нҠё м „мІҙ м„ нғқ - SP
        const selectAllCrossArrivalModal = document.getElementById(
          "selectAllCrossArrivalPorts",
        );
        if (selectAllCrossArrivalModal) {
          const newEl = selectAllCrossArrivalModal.cloneNode(true);
          selectAllCrossArrivalModal.replaceWith(newEl);
          newEl.addEventListener("change", (e) => {
            handlePortSelectAll(
              e.target.checked,
              crossArrivalPortsList,
              selectedCrossArrivalPorts,
              "cross-arrival-port-checkbox-modal",
              "cross-arrival-port-checkbox-sidebar",
            );
          });
        }

        // м•„н”„лҰ¬м№ҙ лҸ„м°© нҸ¬нҠё м „мІҙ м„ нғқ - PC
        const selectAllCrossArrivalSidebar = document.getElementById(
          "selectAllCrossArrivalPortsSidebar",
        );
        if (selectAllCrossArrivalSidebar) {
          const newEl = selectAllCrossArrivalSidebar.cloneNode(true);
          selectAllCrossArrivalSidebar.replaceWith(newEl);
          newEl.addEventListener("change", (e) => {
            handlePortSelectAll(
              e.target.checked,
              crossArrivalPortsList,
              selectedCrossArrivalPorts,
              "cross-arrival-port-checkbox-sidebar",
              "cross-arrival-port-checkbox-modal",
            );
          });
        }
      }

      // нҸ¬нҠё м „мІҙ м„ нғқ мІҳлҰ¬ н—¬нҚј н•ЁмҲҳ
      function handlePortSelectAll(
        isChecked,
        portsList,
        selectedArray,
        primaryClass,
        secondaryClass,
      ) {
        // м„ нғқ л°°м—ҙ м—…лҚ°мқҙнҠё
        selectedArray.splice(0, selectedArray.length);
        if (isChecked) {
          selectedArray.push(...portsList);
        }

        // л©”мқё мІҙнҒ¬л°•мҠӨ UI м—…лҚ°мқҙнҠё
        const primaryCheckboxes = document.querySelectorAll(`.${primaryClass}`);
        primaryCheckboxes.forEach((cb) => (cb.checked = isChecked));

        // лҸҷкё°нҷ”н•  мІҙнҒ¬л°•мҠӨ UI м—…лҚ°мқҙнҠё
        const secondaryCheckboxes = document.querySelectorAll(
          `.${secondaryClass}`,
        );
        secondaryCheckboxes.forEach((cb) => (cb.checked = isChecked));

        updateSelectAllPortsCheckbox();
        updateCalendar();
      }

      // нҸ¬нҠё мІҙнҒ¬л°•мҠӨ мғқм„ұ н—¬нҚј н•ЁмҲҳ (PC/SP кіөнҶө)
      function createPortCheckboxes(
        ports,
        containerId,
        checkboxClass,
        selectedArray,
      ) {
        const container = document.getElementById(containerId);
        if (!container) return;

        // кё°мЎҙ мІҙнҒ¬л°•мҠӨ м ңкұ°
        container.innerHTML = "";

        ports.forEach((port) => {
          const div = document.createElement("div");
          div.className = "flex items-center";

          const checkbox = document.createElement("input");
          checkbox.type = "checkbox";
          checkbox.id = `${checkboxClass}_${port.replace(/\s+/g, "_")}`;
          checkbox.value = port;
          checkbox.checked = selectedArray.includes(port);
          checkbox.className = `mr-2 ${checkboxClass}`;
          checkbox.dataset.port = port;
          checkbox.dataset.type = checkboxClass.includes("departure")
            ? "departure"
            : "arrival";

          const label = document.createElement("label");
          label.htmlFor = checkbox.id;
          label.textContent = port;
          label.className = "cursor-pointer text-xs";

          div.appendChild(checkbox);
          div.appendChild(label);
          container.appendChild(div);

          // checkbox ліҖкІҪ мқҙлІӨнҠё - м–‘мӘҪ лҸҷкё°нҷ”
          checkbox.addEventListener("change", (e) => {
            const portName = e.target.dataset.port;
            const type = e.target.dataset.type;
            const isChecked = e.target.checked;

            // м „м—ӯ мғҒнғң м—…лҚ°мқҙнҠё
            if (isChecked) {
              if (!selectedArray.includes(portName)) {
                selectedArray.push(portName);
              }
            } else {
              const index = selectedArray.indexOf(portName);
              if (index > -1) {
                selectedArray.splice(index, 1);
              }
            }

            // л°ҳлҢҖнҺё мІҙнҒ¬л°•мҠӨ лҸҷкё°нҷ”
            // modal <-> sidebar нҒҙлһҳмҠӨ мҠӨмҷ‘н•ҳм—¬ м°ҫкё°
            const otherClass = checkboxClass.includes("modal")
              ? checkboxClass.replace("modal", "sidebar")
              : checkboxClass.replace("sidebar", "modal");

            const otherCheckbox = document.querySelector(
              `.${otherClass}[data-port="${portName}"]`,
            );
            if (otherCheckbox) {
              otherCheckbox.checked = isChecked;
            }

            updateSelectAllPortsCheckbox();
            updateCalendar();
          });
        });
      }

      // м „мІҙ нҸ¬нҠё м„ нғқ мІҙнҒ¬л°•мҠӨ мғҒнғң м—…лҚ°мқҙнҠё (PC/SP м–‘мӘҪ)
      function updateSelectAllPortsCheckbox() {
        // SP лӘЁлӢ¬мқҳ м¶ңл°ң нҸ¬нҠё
        const depChecksModal = document.querySelectorAll(
          ".departure-port-checkbox-modal",
        );
        const depAllModal = document.getElementById("selectAllDeparturePorts");
        if (depChecksModal.length > 0 && depAllModal) {
          depAllModal.checked = Array.from(depChecksModal).every(
            (cb) => cb.checked,
          );
        }

        // SP лӘЁлӢ¬мқҳ лҸ„м°© нҸ¬нҠё
        const arrChecksModal = document.querySelectorAll(
          ".arrival-port-checkbox-modal",
        );
        const arrAllModal = document.getElementById("selectAllArrivalPorts");
        if (arrChecksModal.length > 0 && arrAllModal) {
          arrAllModal.checked = Array.from(arrChecksModal).every(
            (cb) => cb.checked,
          );
        }

        // PC мӮ¬мқҙл“ңл°”мқҳ м¶ңл°ң нҸ¬нҠё
        const depChecksSidebar = document.querySelectorAll(
          ".departure-port-checkbox-sidebar",
        );
        const depAllSidebar = document.getElementById(
          "selectAllDeparturePortsSidebar",
        );
        if (depChecksSidebar.length > 0 && depAllSidebar) {
          depAllSidebar.checked = Array.from(depChecksSidebar).every(
            (cb) => cb.checked,
          );
        }

        // PC мӮ¬мқҙл“ңл°”мқҳ лҸ„м°© нҸ¬нҠё
        const arrChecksSidebar = document.querySelectorAll(
          ".arrival-port-checkbox-sidebar",
        );
        const arrAllSidebar = document.getElementById(
          "selectAllArrivalPortsSidebar",
        );
        if (arrChecksSidebar.length > 0 && arrAllSidebar) {
          arrAllSidebar.checked = Array.from(arrChecksSidebar).every(
            (cb) => cb.checked,
          );
        }

        // SP лӘЁлӢ¬мқҳ м•„н”„лҰ¬м№ҙ лҸ„м°© нҸ¬нҠё
        const crossArrChecksModal = document.querySelectorAll(
          ".cross-arrival-port-checkbox-modal",

      function updateCalendar() {
        const { events, lineCount } = buildEvents();
        calendar.removeAllEvents();
        calendar.addEventSource(events);

        // н•„н„°л§Ғлҗң кұҙмҲҳ м—…лҚ°мқҙнҠё (SP лӘЁлӢ¬)

        }

        // н•„н„°л§Ғлҗң кұҙмҲҳ м—…лҚ°мқҙнҠё (PC мӮ¬мқҙл“ңл°”)
        const countElementSidebar = document.getElementById(
          "filteredCountSidebar",
        );
        if (countElementSidebar) {

      function parseDateStr(dateStr) {
        if (dateStr === "-") return null;
        const months = [
          "Jan",
          "Feb",
          "Mar",
          "Apr",
          "May",
          "Jun",
          "Jul",
          "Aug",
          "Sep",
          "Oct",
          "Nov",
          "Dec",
        ];
        const monIdx = months.indexOf(dateStr.slice(0, 3));
        const day = parseInt(dateStr.slice(3));
        const now = new Date();
        const currentYear = now.getFullYear();
        const currentMonth = now.getMonth(); // 0-based
        let year = currentYear;

        // JSON лҚ°мқҙн„°лҠ” 0-4к°ңмӣ” лІ”мң„мқҳ мҠӨмјҖмӨ„мқ„ м ңкіө
        // нҳ„мһ¬ мӣ” кё°мӨҖ Вұ4к°ңмӣ” лІ”мң„лҘј лІ—м–ҙлӮҳл©ҙ м—°лҸ„ мЎ°м •
        const monthDiff = monIdx - currentMonth;
        if (monthDiff > 4) {
          // мӣ” м°Ёмқҙк°Җ 4ліҙлӢӨ нҒ¬л©ҙ мһ‘л…„ (мҳҲ: 2мӣ”м—җ 12мӣ” лҚ°мқҙн„° вҶ’ 2025л…„ 12мӣ”)
          year = currentYear - 1;
        } else if (monthDiff < -4) {
          // мӣ” м°Ёмқҙк°Җ -4ліҙлӢӨ мһ‘мңјл©ҙ лӮҙл…„ (мҳҲ: 10мӣ”м—җ 2мӣ” лҚ°мқҙн„° вҶ’ 2027л…„ 2мӣ”)
          year = currentYear + 1;
        }

        return new Date(year, monIdx, day);
      }

      function buildShipSchedule(ship) {
        const scheduleItems = [];

        // м¶ңл°ң н•ӯкө¬ мҠӨмјҖмӨ„
        Object.entries(ship["Departure Ports"]).forEach(([port, dateStr]) => {
          if (dateStr !== "-") {
            const date = parseDateStr(dateStr);
            if (date) {
              scheduleItems.push({
                date: date,
                text: `${port} м¶ңл°ң ${date.getMonth() + 1}мӣ” ${date.getDate()}мқј`,
              });
            }
          }
        });

        // лҸ„м°© н•ӯкө¬ мҠӨмјҖмӨ„
        Object.entries(ship["Arrival Ports"]).forEach(([port, dateStr]) => {
          if (dateStr !== "-") {
            const date = parseDateStr(dateStr);
            if (date) {
              scheduleItems.push({
                date: date,
                text: `${port} лҸ„м°© ${date.getMonth() + 1}мӣ” ${date.getDate()}мқј`,
              });
            }
          }
        });

        // лӮ м§ңмҲңмңјлЎң м •л ¬
        scheduleItems.sort((a, b) => a.date - b.date);

        // н…ҚмҠӨнҠёл§Ң м¶”м¶ңн•ҳм—¬ join
        return scheduleItems.map((item) => item.text).join("<br>");
      }

      function buildEvents() {
        const events = [];
        let lineCount = 0;
        const filteredData =
          selectedCompanies.length === 0
            ? []
            : shippingData.filter((ship) =>
                selectedCompanies.includes(ship.Company),
              );

        filteredData.forEach((ship) => {
          let fullSchedule = buildShipSchedule(ship);

          let hasMatchingCrossArrivalPort = false; // м¶”к°Җ: м•„н”„лҰ¬м№ҙ лҸ„м°© нҸ¬нҠё л§Өм№ӯ м—¬л¶Җ

          // EAST ASIA лЈЁнҠёмқё кІҪмҡ°, ASIA AFRICA м—°мһҘ мҠӨмјҖмӨ„ л§Өм№ӯ л°Ҹ лҸ„м°© нҸ¬нҠё н‘ңмӢң
          if (
            currentRoute === "east_asia" &&
            crossRouteShippingData.length > 0
          ) {
            // 1. Company, Ship Name, Voyage мқјм№ҳ нҷ•мқё
            const crossShipMatch = crossRouteShippingData.find(
              (cs) =>
                cs.Company === ship.Company &&
                cs["Ship Name"] === ship["Ship Name"] &&
                cs.Voyage === ship.Voyage,
            );

            if (crossShipMatch) {
              // 2. м¶ңл°ң нҸ¬нҠё мӨ‘ н•ҳлӮҳлқјлҸ„ лҸҷмқјн•ң кІғмқҙ мһҲлҠ”м§Җ мІҙнҒ¬ (мқјліё нҸ¬нҠё л“ұ)
              let hasMatchingDeparture = false;
              const sourceDepPorts = Object.keys(
                ship["Departure Ports"],
              ).filter((p) => ship["Departure Ports"][p] !== "-");
              const crossDepPorts = Object.keys(
                crossShipMatch["Departure Ports"],
              ).filter((p) => crossShipMatch["Departure Ports"][p] !== "-");

              for (const p of sourceDepPorts) {
                if (crossDepPorts.includes(p)) {
                  hasMatchingDeparture = true;
                  break;
                }
              }

              if (hasMatchingDeparture) {
                const arrivalItems = [];
                Object.entries(crossShipMatch["Arrival Ports"]).forEach(
                  ([port, dateStr]) => {
                    if (dateStr !== "-") {
                      // м„ нғқлҗң м•„н”„лҰ¬м№ҙ лҸ„м°© нҸ¬нҠёк°Җ мһҲлҠ”м§Җ нҷ•мқё
                      if (selectedCrossArrivalPorts.includes(port)) {
                        hasMatchingCrossArrivalPort = true;
                      }

                      const date = parseDateStr(dateStr);
                      if (date) {
                        arrivalItems.push({
                          date: date,
                          text: `${port} лҸ„м°© ${date.getMonth() + 1}мӣ” ${date.getDate()}мқј`,
                        });
                      }
                    }
                  },
                );

                if (arrivalItems.length > 0) {
                  arrivalItems.sort((a, b) => a.date - b.date);
                  const crossScheduleText = arrivalItems
                    .map((item) => item.text)
                    .join("<br>");
                  fullSchedule += `<br><br><span style="color: #009688; font-weight: bold;">[AFRICA лҸ„м°© мҠӨмјҖмӨ„]</span><br>${crossScheduleText}`;
                }
              }
            }
          }

          // н•ҙлӢ№ мҠӨмјҖмӨ„мқҳ м¶ңл°ң лӮ м§ңл§Ң мҲҳм§‘ (к°ҖмһҘ л№ лҘё м¶ңл°ңмқј ~ к°ҖмһҘ лҠҰмқҖ м¶ңл°ңмқј)
          const departureDates = [];
          const departurePorts = [];
          let hasMatchingDeparturePort = false;
          let hasMatchingArrivalPort = false;

          // м¶ңл°ң н•ӯкө¬: м¶ңл°ң лӮ м§ң мҲҳм§‘ + м„ нғқлҗң м¶ңл°ң нҸ¬нҠё л§Өм№ӯ мІҙнҒ¬
          Object.entries(ship["Departure Ports"]).forEach(([port, dateStr]) => {
            if (dateStr !== "-") {
              const date = parseDateStr(dateStr);
              if (date) {
                departureDates.push(date);
                departurePorts.push(port);
              }
              // м„ нғқлҗң м¶ңл°ң нҸ¬нҠём—җ нҸ¬н•Ёлҗҳм–ҙ мһҲкі  мӢӨм ң к°’мқҙ мһҲмңјл©ҙ л§Өм№ӯ
              if (selectedDeparturePorts.includes(port)) {
                hasMatchingDeparturePort = true;
              }
            }
          });

          // лҸ„м°© н•ӯкө¬: м„ нғқлҗң лҸ„м°© нҸ¬нҠё л§Өм№ӯ мІҙнҒ¬ (лӮ м§ң мҲҳм§‘мқҖ н•ҳм§Җ м•ҠмқҢ)
          Object.entries(ship["Arrival Ports"]).forEach(([port, dateStr]) => {
            if (dateStr !== "-") {
              // м„ нғқлҗң лҸ„м°© нҸ¬нҠём—җ нҸ¬н•Ёлҗҳм–ҙ мһҲкі  мӢӨм ң к°’мқҙ мһҲмңјл©ҙ л§Өм№ӯ
              if (selectedArrivalPorts.includes(port)) {
                hasMatchingArrivalPort = true;
              }
            }
          });

          // н•„н„° мЎ°кұҙ мІҙнҒ¬
          // 1. нҸ¬нҠёк°Җ н•ҳлӮҳлҸ„ м„ нғқлҗҳм§Җ м•Ҡм•ҳмңјл©ҙ лӘЁл“  мҠӨмјҖмӨ„ н‘ңмӢң
          // 2. м¶ңл°ң нҸ¬нҠёл§Ң м„ нғқлҗҳм—Ҳмңјл©ҙ м¶ңл°ң нҸ¬нҠё мЎ°кұҙл§Ң мІҙнҒ¬
          // 3. лҸ„м°© нҸ¬нҠёл§Ң м„ нғқлҗҳм—Ҳмңјл©ҙ лҸ„м°© нҸ¬нҠё мЎ°кұҙл§Ң мІҙнҒ¬
          // 4. л‘ҳ лӢӨ м„ нғқлҗҳм—Ҳмңјл©ҙ л‘ҳ лӢӨ л§ҢмЎұн•ҙм•ј н‘ңмӢң (AND)
          const noDepartureSelected = selectedDeparturePorts.length === 0;
          const noArrivalSelected = selectedArrivalPorts.length === 0;

          let shouldShow = false;
          if (noDepartureSelected && noArrivalSelected) {
            // нҸ¬нҠё м„ нғқ м—ҶмқҢ -> нҡҢмӮ¬л§ҢмңјлЎң н‘ңмӢң
            shouldShow = true;
          } else if (noDepartureSelected) {
            // лҸ„м°© нҸ¬нҠёл§Ң м„ нғқлҗЁ
            shouldShow = hasMatchingArrivalPort;
          } else if (noArrivalSelected) {
            // м¶ңл°ң нҸ¬нҠёл§Ң м„ нғқлҗЁ
            shouldShow = hasMatchingDeparturePort;
          } else {
            // л‘ҳ лӢӨ м„ нғқлҗЁ -> AND мЎ°кұҙ
            shouldShow = hasMatchingDeparturePort && hasMatchingArrivalPort;
          }

          // EAST ASIA м „мҡ© м•„н”„лҰ¬м№ҙ лҸ„м°© нҸ¬нҠё н•„н„° м Ғмҡ©
          if (
            shouldShow &&
            currentRoute === "east_asia" &&
            selectedCrossArrivalPorts.length > 0
          ) {
            shouldShow = hasMatchingCrossArrivalPort;
          }

          if (shouldShow && departureDates.length > 0) {
            // м¶ңл°ң лӮ м§ң м •л ¬: к°ҖмһҘ л№ лҘё м¶ңл°ңмқј ~ к°ҖмһҘ лҠҰмқҖ м¶ңл°ңмқј
            departureDates.sort((a, b) => a - b);

            const startDate = departureDates[0];
            const endDate = departureDates[departureDates.length - 1];

            // мў…лЈҢмқјм—җ 1мқј м¶”к°Җ (FullCalendarмқҳ endлҠ” exclusive)
            const endDatePlusOne = new Date(endDate);
            endDatePlusOne.setDate(endDatePlusOne.getDate() + 1);

            const startFormatted = `${startDate.getFullYear()}л…„ ${startDate.getMonth() + 1}мӣ” ${startDate.getDate()}мқј`;
            const endFormatted = `${endDate.getFullYear()}л…„ ${endDate.getMonth() + 1}мӣ” ${endDate.getDate()}мқј`;

            // м¶ңл°ң нҸ¬нҠёл“Өмқ„ titleм—җ м¶”к°Җ
            const portsText =
              departurePorts.length > 0
                ? ` (${departurePorts.join(", ")})`
                : "";

            // м•„м№ҙмқҙлёҢ м—¬л¶Җм—җ л”°лқј UI мҠӨнғҖмқј ліҖкІҪ
            const opacityStyle = ship.isArchive ? "opacity: 0.5;" : "";
            const archiveHtmlTag = ship.isArchive
              ? `<div style="color: #e74c3c; font-weight: bold; margin-bottom: 5px;">[кё°к°„ м§ҖлӮң мҠӨмјҖмӨ„]</div>`
              : "";

            // кё°к°„ мқҙлІӨнҠё (лқјмқё мҠӨмјҖмӨ„)
            events.push({
              title: `${ship.Company} - ${ship["Ship Name"]} [${ship.Voyage}]${portsText}`,
              start: startDate,
              end: endDatePlusOne,
              backgroundColor: companyColors[ship.Company], // нҡҢмӮ¬лі„ мғүмғҒ м Ғмҡ©
              borderColor: companyColors[ship.Company], // нҡҢмӮ¬лі„ мғүмғҒ м Ғмҡ©
              eventType: "line",
              isArchive: ship.isArchive, // л ҢлҚ”л§Ғ мӢң нҲ¬лӘ…лҸ„ л¶Җм—¬мҡ©
              description: `${archiveHtmlTag}<strong>${ship.Company}</strong><br>${ship["Ship Name"]} [${ship.Voyage}]<br><br><strong>м¶ңл°ң кё°к°„:</strong><br> ${startFormatted} ~ ${endFormatted}<br><br><strong>м „мІҙ мҠӨмјҖмӨ„:</strong><br>${fullSchedule}`,
            });

            // мөңмӢ  лҚ°мқҙн„°мқј л•Ңл§Ң Count н•ҳлӮҳ мҰқк°Җ
            if (!ship.isArchive) {
              lineCount += 1;
            }

            // м¶”к°Җ: к°Ғ м¶ңл°ң нҸ¬нҠёлі„ мқҙлІӨнҠё (нҸ¬нҠёлӘ… н‘ңмӢңмҡ©)
            if (departureDates.length > 1) {
              // м¶ңл°ңмқҙ н•ҳлЈЁл§Ң мһҲлҠ” кІҪмҡ°лҠ” кё°к°„ мқҙлІӨнҠём—җ нҸ¬н•Ён•ҳлҜҖлЎң нҸ¬нҠё мқҙлІӨнҠё мғқм„ұн•ҳм§Җ м•ҠмқҢ
              Object.entries(ship["Departure Ports"]).forEach(
                ([port, dateStr]) => {
                  if (dateStr !== "-") {
                    const departureDate = parseDateStr(dateStr);
                    if (departureDate) {
                      let portShouldShow = false;
                      if (noDepartureSelected && noArrivalSelected) {
                        portShouldShow = true;
                      } else if (noDepartureSelected) {
                        portShouldShow = hasMatchingArrivalPort;
                      } else if (noArrivalSelected) {
                        portShouldShow = selectedDeparturePorts.includes(port);
                      } else {
                        portShouldShow =
                          selectedDeparturePorts.includes(port) &&
                          hasMatchingArrivalPort;
                      }

                      if (portShouldShow) {
                        const dateFormatted = `${departureDate.getFullYear()}л…„ ${departureDate.getMonth() + 1}мӣ” ${departureDate.getDate()}мқј`;
                        events.push({
                          title: `${port} [${ship.Company}]`, // нҸ¬нҠёлӘ… [нҡҢмӮ¬лӘ…] н‘ңмӢң
                          start: departureDate,
                          backgroundColor: companyColors[ship.Company], // нҡҢмӮ¬ м»¬лҹ¬ м Ғмҡ©
                          borderColor: companyColors[ship.Company],
                          eventType: "port",
                          isArchive: ship.isArchive, // л ҢлҚ”л§Ғ мӢң нҲ¬лӘ…лҸ„ л¶Җм—¬мҡ©
                          description: `${archiveHtmlTag}<strong>${ship.Company}</strong><br>${ship["Ship Name"]} [${ship.Voyage}]<br><br><strong>м¶ңл°ң:<br></strong> ${port} - ${dateFormatted}<br><br><strong>м „мІҙ мҠӨмјҖмӨ„:</strong><br>${fullSchedule}`,
                        });
                      }
                    }
                  }
                },
              );
            }
          }
        });
        return { events, lineCount };
      }

      function initCalendars() {
        const { events, lineCount } = buildEvents();
        const now = new Date();
        const currentYear = now.getFullYear();
        const currentMonth = now.getMonth();

        // мҙҲкё° н•„н„°л§Ғ кұҙмҲҳ н‘ңмӢң (SP/PC м–‘мӘҪ)
        const countElementModal = document.getElementById("filteredCount");
        if (countElementModal) {
          countElementModal.textContent = lineCount;
        }
        const countElementSidebar = document.getElementById(
          "filteredCountSidebar",
        );
        if (countElementSidebar) {
          countElementSidebar.textContent = lineCount;
        }

        // Calendar 1: Current month
        calendar = new FullCalendar.Calendar(
          document.getElementById("calendar"),
          {
            initialView: "dayGridMonth",
            multiMonthMaxColumns: 1,
            initialDate: new Date(currentYear, currentMonth, 1),
            events: events,
            height: "90vh",
            headerToolbar: {
              left: "dayGridMonth,dayGridWeek",
              center: "title",
              right: "today,prev,next",
            },
            eventContent: function (info) {
              // кё°к°„ мқҙлІӨнҠёлҠ” нҡҢмӮ¬лӘ…, м„ л°• мқҙлҰ„, voyage н‘ңмӢңн•ҳм—¬ нғҖмқҙнӢҖ мғқлһө л°©м§Җ
              if (info.event.title.includes(" - ")) {
                const parts = info.event.title.split(" - ");
                const company = parts[0];
                const rest = parts[1];
                const shipName = rest.split(" [")[0];
                const voyage = rest.split(" [")[1].split("]")[0];

                // м¶ңл°ңмқҙ н•ҳлЈЁл§Ң мһҲлҠ” кё°к°„ мқҙлІӨнҠёлҠ” нҸ¬нҠё мқҙлІӨнҠёмІҳлҹј нҡҢмӮ¬ м»¬лҹ¬ мӣҗ м¶”к°Җ + нҸ¬нҠёлӘ… нҸ¬н•Ё
                const isSingleDay =
                  (new Date(info.event.end) - new Date(info.event.start)) /
                    (1000 * 60 * 60 * 24) ===
                  1;
                if (isSingleDay) {
                  const color = info.event.backgroundColor;
                  const portText = rest.split("]")[1].trim(); // " (нҸ¬нҠёлӘ…)"
                  const portName = portText ? portText.slice(1, -1) : ""; // нҸ¬нҠёлӘ… м¶”м¶ң
                  return {
                    html: `<span style="display: inline-block; width: 10px; height: 10px; border-radius: 50%; background-color: ${color}; margin-right: 5px; flex: none;"></span>${shipName} [${voyage}] (${portName})`,
                  };
                } else {
                  return {
                    html: `<span style="padding: 0 3px;"><strong>${company}</strong> - ${shipName} [${voyage}]</span>`,
                  };
                }
              } else {
                // нҸ¬нҠё мқҙлІӨнҠё: нҡҢмӮ¬ м»¬лҹ¬ мӣҗ + нҸ¬нҠёлӘ…
                const color = info.event.backgroundColor;
                const portName = info.event.title.split(" [")[0]; // нҸ¬нҠёлӘ…л§Ң м¶”м¶ң
                return {
                  html: `<span style="display: inline-block; width: 10px; height: 10px; border-radius: 50%; background-color: ${color}; margin-right: 5px; flex: none;"></span>${portName}`,
                };
              }
            },
            eventDidMount: function (info) {
              // м•„м№ҙмқҙлёҢлҗң кё°к°„мқҙ м§ҖлӮң мҠӨмјҖмӨ„мқҖ нҲ¬лӘ…лҸ„ 0.5 м Ғмҡ©
              if (info.event.extendedProps.isArchive) {
                info.el.style.opacity = "0.5";
              }
            },
            eventMouseEnter: function (info) {
              // кё°мЎҙ нҲҙнҢҒмқҙ мһҲлӢӨл©ҙ м ңкұ° (мӨ‘ліө л°©м§Җ)
              if (info.el.tooltip) {
                document.body.removeChild(info.el.tooltip);
                info.el.tooltip = null;
              }
              if (info.el.tooltipTimeout) {
                clearTimeout(info.el.tooltipTimeout);
                info.el.tooltipTimeout = null;
              }

              // нҲҙнҢҒ мғқм„ұ
              const tooltip = document.createElement("div");
              tooltip.className = "fc-tooltip";
              tooltip.innerHTML = info.event.extendedProps.description;
              tooltip.style.position = "fixed";
              tooltip.style.background = "white";
              tooltip.style.border = "1px solid #ccc";
              tooltip.style.zIndex = "10000";

              // л§Ҳмҡ°мҠӨ мҳӨлІ„к°Җ к°ҖлҠҘн•ҳлҸ„лЎқ pointerEventsлҘј autoлЎң м„Өм •
              tooltip.style.pointerEvents = "auto";

              // нҒ¬кё°лҘј м •нҷ•нһҲ кі„мӮ°н•ҳкё° мң„н•ҙ нҷ”л©ҙ мўҢмёЎ мғҒлӢЁм—җ мҲЁкёҙ мғҒнғңлЎң л°°м№ҳ
              tooltip.style.visibility = "hidden";
              tooltip.style.top = "0px";
              tooltip.style.left = "0px";
              document.body.appendChild(tooltip);

              const rect = info.el.getBoundingClientRect();
              const tooltipRect = tooltip.getBoundingClientRect();

              // мҠӨнҒ¬лЎӨл°”лҘј м ңмҷён•ң мӢӨм ң ліҙмқҙлҠ” нҷ”л©ҙ нҒ¬кё° мӮ¬мҡ©
              const viewportHeight =
                document.documentElement.clientHeight || window.innerHeight;
              const viewportWidth =
                document.documentElement.clientWidth || window.innerWidth;

              // нҷ”л©ҙ мӨ‘мӢ¬мқ„ кё°мӨҖмңјлЎң 4л“ұл¶„ нҢҗлі„мҡ©
              const centerX = viewportWidth / 2;
              const centerY = viewportHeight / 2;

              // л§Ҳмҡ°мҠӨ м»Өм„ңмқҳ мң„м№ҳ
              const mouseX = info.jsEvent.clientX; // Event л·°нҸ¬нҠё X мўҢн‘ң
              const mouseY = info.jsEvent.clientY; // Event л·°нҸ¬нҠё Y мўҢн‘ң

              let topPos, leftPos;
              const margin = 15; // л§Ҳмҡ°мҠӨ м»Өм„ңлҘј к°ҖлҰ¬м§Җ м•Ҡкё° мң„н•ң м—¬л°ұ

              // Yм¶•: мғҒлӢЁ/н•ҳлӢЁ нҢҗлі„ - л§Ҳмҡ°мҠӨ мң„м№ҳ кё°мӨҖ
              if (mouseY < centerY) {
                // нҷ”л©ҙмқҳ мң„мӘҪ м Ҳл°ҳ -> нҲҙнҢҒмқҖ л§Ҳмҡ°мҠӨ м•„лһҳмӘҪм—җ н‘ңмӢң
                topPos = mouseY + margin;
              } else {
                // нҷ”л©ҙмқҳ м•„лһҳмӘҪ м Ҳл°ҳ -> нҲҙнҢҒмқҖ л§Ҳмҡ°мҠӨ мң„мӘҪм—җ н‘ңмӢң
                topPos = mouseY - tooltipRect.height - margin;
              }

              // Xм¶•: мўҢмёЎ/мҡ°мёЎ нҢҗлі„ - л§Ҳмҡ°мҠӨ мң„м№ҳ кё°мӨҖ
              if (mouseX < centerX) {
                // нҷ”л©ҙмқҳ мҷјмӘҪ м Ҳл°ҳ -> нҲҙнҢҒмқҖ л§Ҳмҡ°мҠӨ мҡ°мёЎм—җ н‘ңмӢң
                leftPos = mouseX + margin;
              } else {
                // нҷ”л©ҙмқҳ мҳӨлҘёмӘҪ м Ҳл°ҳ -> нҲҙнҢҒмқҖ л§Ҳмҡ°мҠӨ мўҢмёЎм—җ н‘ңмӢң
                leftPos = mouseX - tooltipRect.width - margin;
              }

              // мөңнӣ„мқҳ м•Ҳм „мһҘм№ҳ: лёҢлқјмҡ°м Җ м°Ҫ л°”к№ҘмңјлЎң лІ—м–ҙлӮҳлҠ” кІғ л°©м§Җ
              if (topPos < 5) topPos = 5;
              if (topPos + tooltipRect.height > viewportHeight - 5) {
                topPos = viewportHeight - tooltipRect.height - 5;
              }
              if (leftPos < 5) leftPos = 5;
              if (leftPos + tooltipRect.width > viewportWidth - 5) {
                leftPos = viewportWidth - tooltipRect.width - 5;
              }

              tooltip.style.left = leftPos + "px";
              tooltip.style.top = topPos + "px";
              tooltip.style.visibility = "visible"; // лӢӨмӢң н‘ңмӢң

              info.el.tooltip = tooltip;

              // нҲҙнҢҒм—җм„ң л§Ҳмҡ°мҠӨк°Җ лІ—м–ҙлӮ  л•Ң мІҳлҰ¬
              tooltip.addEventListener("mouseleave", () => {
                info.el.tooltipTimeout = setTimeout(() => {
                  if (info.el.tooltip) {
                    document.body.removeChild(info.el.tooltip);
                    info.el.tooltip = null;
                  }
                }, 100);
              });

              // нҲҙнҢҒм—җ л§Ҳмҡ°мҠӨк°Җ л“Өм–ҙмҳ¬ л•Ң (мқҙлІӨнҠём—җм„ң нҲҙнҢҒмңјлЎң мқҙлҸҷ мӢң м ңкұ° м·ЁмҶҢ)
              tooltip.addEventListener("mouseenter", () => {
                if (info.el.tooltipTimeout) {
                  clearTimeout(info.el.tooltipTimeout);
                  info.el.tooltipTimeout = null;
                }
              });
            },
            eventMouseLeave: function (info) {
              // нҲҙнҢҒ м ңкұ° (м•Ҫк°„мқҳ л”ңл ҲмқҙлҘј мЈјм–ҙ мқҙлІӨнҠём—җм„ң нҲҙнҢҒмңјлЎң л§Ҳмҡ°мҠӨ мқҙлҸҷ мӢңк°„ нҷ•ліҙ)
              info.el.tooltipTimeout = setTimeout(() => {
                if (info.el.tooltip) {
                  document.body.removeChild(info.el.tooltip);
                  info.el.tooltip = null;
                }
              }, 100);
            },
          },
        );
        calendar.render();

        // м „м—ӯ нӮӨліҙл“ң мЎ°мһ‘ м¶”к°Җ
        document.addEventListener("keydown", function (event) {
          // мәҳлҰ°лҚ”к°Җ мҙҲкё°нҷ”лҗң кІҪмҡ°м—җл§Ң мӢӨн–ү
          if (calendar) {
            if (event.key === "ArrowLeft") {
              calendar.prev(); // мқҙм „ лӢ¬лЎң мқҙлҸҷ
              event.preventDefault(); // кё°ліё лҸҷмһ‘ л°©м§Җ
            } else if (event.key === "ArrowRight") {
              calendar.next(); // лӢӨмқҢ лӢ¬лЎң мқҙлҸҷ
              event.preventDefault(); // кё°ліё лҸҷмһ‘ л°©м§Җ
            } else if (event.key === "ArrowUp") {
              calendar.today(); // мҳӨлҠҳлЎң мқҙлҸҷ
              event.preventDefault();
            }
          }
        });
      }
    </script>
  </body>
</html>
